<meta charset="UTF-8">

<style>

    }

    @font-face {
        font-family: "Inter";
        src: url("fonts/Inter/static/Inter_18pt-Bold.ttf") format("truetype");
        font-weight: 700;
    }
    body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        color: #222222;
        background: #fff;
    }

    .link-return__title {
        display: inline;
        color: black;
        font-size: 16px;
    }
    .info {
        max-width: 100%;
        padding: 30px 21px 30px 15px;
    }
    .link-return {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 24px;
        color: black;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
    }
    .link-return__arrow {
        width: 28px;
        height: 28px;
    }
    .info__title {
        margin: 0 0 32px;
        font-family: "Inter Tight", sans-serif;
        font-size: 30px;
        font-weight: 700;
        line-height: 1.1;
    }
    .schedule {
        margin-top: 36px;
    }
    .schedule__title {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 600;
    }
    .schedule__item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 0;
        color: inherit;
        text-decoration: none;
        border-top: 1px solid #EAEAEA;
    }
    .schedule__item:last-child {
        border-bottom: 1px solid #EAEAEA;
    }
    .schedule__left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }
    .schedule__left span {
        font-size: 14px;
        line-height: 1.4;
    }
    .schedule__left img {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
    }
    .schedule__action {
        color: #FA5D20;
        font-size: 14px;
    }
    @media (min-width: 768px) {
        .info {
            padding: 30px 21px 30px 15px;
        }
        .title {
            font-size: 56px;
        }
        .item__title {
            font-size: 24px;
        }
        .item__text {
            font-size: 19px;
        }
        .schedule__left span {
            font-size: 17px;
        }
        .schedule__item {
            padding: 22px 0;
        }
    }
    @media (min-width: 1024px) {
        .info {
            padding: 50px 9.114vw;
            max-width: 100vw
        }
        .title {
            font-size: 64px;
        }
        .item__title {
            font-size: 26px;
        }
        .item__text {
            font-size: 20px;
        }
        .schedule__left span {
            font-size: 18px;
        }
        .schedule__item {
            padding: 24px 0;
        }
    }
    @media (min-width: 2000px) {
        .info {
            max-width: 100vw;
            width: 90vw
        }
    }
</style>

        }
    ];
document.addEventListener("DOMContentLoaded", () => {
    const container = document.querySelector(".schedule-container");
    schedule.forEach(section => {
        const block = document.createElement("div");
        block.className = "schedule";
        block.style.marginBottom = "50px";
        const title = document.createElement("p");
        title.className = "schedule__title";
        title.textContent = section.title;
        block.appendChild(title);
        section.items.forEach(item => {
            const link = document.createElement("a");
            link.className = "schedule__item";
            link.href = item.link;
            link.innerHTML = `
                <div class="schedule__left">
                    <img src="images/Document.svg" alt="table">
                    <span>${item.name}</span>
                </div>
                <span class="schedule__action">Открыть</span>
            `;
            block.appendChild(link);
        });
        container.appendChild(block);
    });
});
</script>
